<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10' fill='%231DB954'/></svg>">
    <title>Spotify - Music for Everyone</title>
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='10' fill='%231DB954'/%3E%3Ctext x='12' y='15' font-size='12' fill='white' text-anchor='middle' font-weight='bold'%3ES%3C/text%3E%3C/svg%3E" alt="Spotify">
            <h1>SPOTIFY</h1>
        </div>
        
        <nav class="sidebar-nav">
            <div class="nav-section">
                <h3>MENU</h3>
                <ul>
                    <li class="active"><i class="fas fa-home"></i> <a href="#home">Home</a></li>
                    <li><i class="fas fa-search"></i> <a href="#search">Search</a></li>
                    <li><i class="fas fa-compact-disc"></i> <a href="#library">Your Library</a></li>
                </ul>
            </div>
            
            <div class="nav-section">
                <h3>PLAYLISTS</h3>
                <ul id="playlists">
                    <li><a href="#playlist-1">❤️ Liked Songs</a></li>
                    <li><a href="#playlist-2">🎵 Chill Vibes</a></li>
                    <li><a href="#playlist-3">🔥 Hit Mix</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="nav-btn prev-btn"><i class="fas fa-chevron-left"></i></button>
                <button class="nav-btn next-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="header-center">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search songs, artists, albums...">
                </div>
            </div>
            <div class="header-right">
                <button class="user-btn"><i class="fas fa-user-circle"></i> Login</button>
            </div>
        </header>

        <!-- Now Playing Section -->
        <section class="now-playing">
            <div class="album-art-container">
                <div class="album-art">
                    <img id="albumArt" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect fill='%23282828' width='200' height='200'/%3E%3Ccircle cx='100' cy='100' r='60' fill='%231DB954'/%3E%3Ccircle cx='100' cy='100' r='15' fill='%23282828'/%3E%3C/svg%3E" alt="Album Art">
                    <div class="album-spinner" id="spinner"></div>
                </div>
            </div>
            <div class="now-playing-info">
                <h2 id="nowPlayingSong">Select a song to play</h2>
                <p id="nowPlayingArtist">Artists will appear here</p>
            </div>
        </section>

        <!-- Main Content Area -->
        <section class="content-area">
            <div class="section-header">
                <h2>Popular Songs</h2>
                <a href="#" class="see-all">See All</a>
            </div>

            <!-- Music Grid -->
            <div class="songs-grid" id="songsGrid">
                <!-- Songs will be generated here -->
            </div>

            <!-- Album Grid Section -->
            <div class="section-header" style="margin-top: 40px;">
                <h2>Featured Albums</h2>
                <a href="#" class="see-all">See All</a>
            </div>

            <div class="albums-grid" id="albumsGrid">
                <!-- Albums will be generated here -->
            </div>
        </section>
    </div>

    <!-- Now Playing Bar -->
    <div class="now-playing-bar">
        <div class="song-details">
            <img id="playerAlbumArt" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 56 56'%3E%3Crect fill='%23404040' width='56' height='56'/%3E%3Ccircle cx='28' cy='28' r='15' fill='%231DB954'/%3E%3C/svg%3E" alt="Album">
            <div class="song-info">
                <div id="playerSongName">Play a song</div>
                <div id="playerArtistName">Artist name</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <button id="shuffleBtn" class="control-btn shuffle-btn" title="Shuffle">
                    <i class="fas fa-random"></i>
                </button>
                <button id="prevBtn" class="control-btn prev-btn-player">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button id="playBtn" class="control-btn play-btn">
                    <i class="fas fa-play"></i>
                </button>
                <button id="nextBtn" class="control-btn next-btn-player">
                    <i class="fas fa-step-forward"></i>
                </button>
                <button id="repeatBtn" class="control-btn repeat-btn" title="Repeat">
                    <i class="fas fa-redo"></i>
                </button>
            </div>

            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar">
                    <input type="range" id="progressSlider" min="0" max="100" value="0">
                    <div class="progress-fill"></div>
                </div>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-up"></i>
            <input type="range" id="volumeSlider" min="0" max="100" value="70">
        </div>

        <audio id="audioPlayer"></audio>
    </div>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts -->
    <script src="style.js"></script>
</body>
</html>
